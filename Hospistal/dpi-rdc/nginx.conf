server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # CSP explicite : Alpine.js (embarqué dans Livewire) requiert 'unsafe-eval'.
    # Sans cet en-tête, un proxy/extension restrictif casse tous les boutons.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Routes dynamiques Livewire — toujours via PHP, jamais en cache
    location ^~ /livewire/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Fichiers statiques réels uniquement — 404 si absent (jamais de fallback PHP)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
