services:
  app:
    build: .
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dpi_${ESTABLISHMENT_CODE}
      DB_USERNAME: dpi_user
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      ESTABLISHMENT_CODE: ${ESTABLISHMENT_CODE}
      ESTABLISHMENT_NAME: ${ESTABLISHMENT_NAME}
      CENTRAL_API_URL: ${CENTRAL_API_URL}
      CENTRAL_SYNC_TOKEN: ${CENTRAL_SYNC_TOKEN}
    volumes:
      - ./app:/var/www/app
      - ./routes:/var/www/routes
      - ./resources:/var/www/resources
      - ./config:/var/www/config
      - ./database:/var/www/database
      - ./bootstrap:/var/www/bootstrap
      - ./storage:/var/www/storage
      - ./public:/var/www/public
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dpi_${ESTABLISHMENT_CODE}
      POSTGRES_USER: dpi_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpi_user -d dpi_${ESTABLISHMENT_CODE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  horizon:
    build: .
    command: php artisan horizon
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dpi_${ESTABLISHMENT_CODE}
      DB_USERNAME: dpi_user
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./app:/var/www/app
      - ./storage:/var/www/storage
    depends_on:
      - app
      - redis
      - db

  scheduler:
    build: .
    command: php artisan schedule:work
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dpi_${ESTABLISHMENT_CODE}
      DB_USERNAME: dpi_user
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      ESTABLISHMENT_CODE: ${ESTABLISHMENT_CODE}
      CENTRAL_GPG_KEY: ${CENTRAL_GPG_KEY}
      CENTRAL_HOST: ${CENTRAL_HOST}
      CENTRAL_USER: ${CENTRAL_USER}
    volumes:
      - ./app:/var/www/app
      - ./bootstrap:/var/www/bootstrap
      - ./storage:/var/www/storage
      - ./backups:/backups
    depends_on:
      - app
      - db

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./public:/var/www/public
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  pgdata:
  redisdata:
